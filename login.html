<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Inkwell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
</head>

<body>

    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1050;">
        <button id="theme-toggle" class="btn btn-link text-dark p-0 me-2"><i id="theme-icon"
                class="bi bi-moon-stars-fill"></i></button>
        <button id="rtl-toggle" class="btn btn-link text-dark p-0">RTL</button>
    </div>

    <main class="min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="card border-0 shadow-sm overflow-hidden">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <a href="index.html">
                                    <img src="assets/images/logo-lockup.svg" alt="Inkwell" class="mb-4"
                                        style="height: 50px;">
                                </a>
                                <h1 class="h3 mb-2">Login</h1>
                                <p class="mb-0 text-muted">Log in to request a quote.</p>
                            </div>
                            <form action="#" method="post">
                                <div class="mb-3">
                                    <label for="loginEmail" class="form-label">Email Address</label>
                                    <input id="loginEmail" type="email" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label for="loginPassword" class="form-label">Password</label>
                                    <div class="password-field-container">
                                        <input id="loginPassword" type="password" class="form-control" required>
                                        <i class="bi bi-eye password-toggle"></i>
                                    </div>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label small" for="rememberMe">Remember me</label>
                                    </div>
                                    <a href="#" class="small">Forgot password?</a>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Login</button>
                            </form>

                            <div class="social-separator">OR</div>

                            <div class="social-login-grid mb-4">
                                <a href="#" class="btn btn-social" title="Continue with Google">
                                    <i class="bi bi-google"></i>
                                </a>
                                <a href="#" class="btn btn-social" title="Continue with Facebook">
                                    <i class="bi bi-facebook"></i>
                                </a>
                                <a href="#" class="btn btn-social" title="Continue with X">
                                    <i class="bi bi-twitter-x"></i>
                                </a>
                            </div>

                            <div class="mt-4 text-center border-top pt-4">
                                <p class="mb-0 small">No account yet? <a href="register.html"
                                        class="fw-semibold">Register here</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
